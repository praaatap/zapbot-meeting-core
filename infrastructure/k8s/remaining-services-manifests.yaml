---
# Delivery Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-service
  namespace: echomeet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: delivery-service
  template:
    metadata:
      labels:
        app: delivery-service
    spec:
      containers:
      - name: delivery-service
        image: echomeet/delivery-service:latest
        ports:
        - containerPort: 3005
        envFrom:
        - configMapRef:
            name: delivery-service-config
        - secretRef:
            name: echomeet-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: delivery-service
  namespace: echomeet
spec:
  selector:
    app: delivery-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3005
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: delivery-service-config
  namespace: echomeet
data:
  NODE_ENV: "production"
  PORT: "3005"
  MONGODB_URI: "mongodb://mongodb.echomeet.svc.cluster.local:27017/echomeet"
  AWS_REGION: "us-east-1"
  S3_REPORTS_BUCKET: "echomeet-reports"
  SES_FROM_EMAIL: "reports@echomeet.ai"
