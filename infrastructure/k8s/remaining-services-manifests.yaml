# Diarization Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: diarization-service
  namespace: echomeet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: diarization-service
  template:
    metadata:
      labels:
        app: diarization-service
    spec:
      containers:
      - name: diarization-service
        image: echomeet/diarization-service:latest
        ports:
        - containerPort: 3003
        envFrom:
        - configMapRef:
            name: diarization-service-config
        - secretRef:
            name: echomeet-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: diarization-service
  namespace: echomeet
spec:
  selector:
    app: diarization-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3003
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: diarization-service-config
  namespace: echomeet
data:
  NODE_ENV: "production"
  PORT: "3003"
  MONGODB_URI: "mongodb://mongodb.echomeet.svc.cluster.local:27017/echomeet"
---
